<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Deep Forest Twilight to Damp Moss Gradient -->
    <linearGradient id="forest-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a121c" />
      <stop offset="45%" stop-color="#12252a" />
      <stop offset="80%" stop-color="#0e1f18" />
      <stop offset="100%" stop-color="#040906" />
    </linearGradient>

    <!-- God Ray Sunbeam Gradient -->
    <linearGradient id="god-ray" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#bfdbfe" stop-opacity="0.18" />
      <stop offset="50%" stop-color="#a7f3d0" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#050806" stop-opacity="0" />
    </linearGradient>

    <!-- Glassmorphic Card Gradient -->
    <linearGradient id="glass-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.01" />
    </linearGradient>

    <!-- Fog & Glow Filters -->
    <filter id="fog-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
    </filter>

    <filter id="forest-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800;900&amp;family=Playfair+Display:ital,wght@0,500;0,700;1,400&amp;family=Plus+Jakarta+Sans:wght@500;700&amp;display=swap');
      
      <![CDATA[
      .title-text {
        font-family: 'Cinzel', serif;
        font-weight: 800;
        letter-spacing: 3px;
      }
      
      .script-text {
        font-family: 'Playfair Display', Georgia, serif;
      }
      
      .small-label {
        font-family: 'Cinzel', serif;
        font-weight: 600;
        font-size: 11px;
        letter-spacing: 2px;
      }

      /* Rain, Wind & Foliage Swaying Animations */
      .rain-streak {
        stroke: #a5f3fc;
        stroke-opacity: 0.18;
        stroke-dasharray: 6 18;
        animation: rain-fall infinite linear;
      }

      .fog-wave {
        fill: #34d399;
        fill-opacity: 0.05;
        animation: fog-drift-horizontal infinite ease-in-out;
      }
      
      .fog-wave-alt {
        fill: #60a5fa;
        fill-opacity: 0.04;
        animation: fog-drift-horizontal-alt infinite ease-in-out;
      }

      .moss-branch {
        transform-origin: top left;
        animation: branch-sway 10s infinite ease-in-out;
      }

      .fern-leaf {
        transform-origin: bottom center;
        animation: fern-sway 7s infinite ease-in-out;
      }
      
      .fern-leaf-delayed {
        transform-origin: bottom center;
        animation: fern-sway 8s infinite ease-in-out 1.5s;
      }

      .god-rays {
        animation: sunbeam-pulse 6s infinite ease-in-out;
      }

      .glass-card {
        animation: card-float 8s infinite ease-in-out;
      }

      .firefly-glow {
        animation: firefly-pulse 4.5s infinite ease-in-out;
      }

      /* Animations Code */
      @keyframes rain-fall {
        0% { stroke-dashoffset: 100; transform: translate(0, -150px); opacity: 0; }
        30% { opacity: 0.6; }
        85% { opacity: 0.6; }
        100% { stroke-dashoffset: -300; transform: translate(-40px, 450px); opacity: 0; }
      }

      @keyframes fog-drift-horizontal {
        0% { transform: translate(-150px, 40px) scale(1); opacity: 0; }
        30% { opacity: 0.4; }
        70% { opacity: 0.4; }
        100% { transform: translate(750px, -20px) scale(1.4); opacity: 0; }
      }

      @keyframes fog-drift-horizontal-alt {
        0% { transform: translate(-200px, 120px) scale(1.3); opacity: 0; }
        40% { opacity: 0.3; }
        80% { opacity: 0.3; }
        100% { transform: translate(700px, 80px) scale(0.95); opacity: 0; }
      }

      @keyframes branch-sway {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(1.2deg); }
      }

      @keyframes fern-sway {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(3deg); }
      }

      @keyframes sunbeam-pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.95; }
      }

      @keyframes card-float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-6px) rotate(0.3deg); }
      }

      @keyframes firefly-pulse {
        0%, 100% { opacity: 0.2; transform: scale(0.8); }
        50% { opacity: 0.95; transform: scale(1.2); }
      }
      ]]>
    </style>
  </defs>

  <!-- Deep Moody Forest Background -->
  <rect width="800" height="450" rx="24" fill="url(#forest-sky)" stroke="#0e1713" stroke-width="2.5" />

  <!-- God Rays / Sunbeams Filtering Through Wet Canopy -->
  <polygon points="500,0 800,0 800,450 300,450" fill="url(#god-ray)" class="god-rays" />
  <polygon points="250,0 450,0 200,450 0,450" fill="url(#god-ray)" class="god-rays" style="animation-delay: 2s; opacity: 0.5;" />

  <!-- Deepest Layer of Distant Trees (Silhouettes) -->
  <g fill="#0b1716" opacity="0.3">
    <!-- Distant Mountain/Hill outline -->
    <path d="M 0,280 Q 180,240 380,260 T 800,220 L 800,450 L 0,450 Z" />
    <!-- Distant Pines -->
    <polygon points="60,255 50,280 70,280" />
    <polygon points="120,250 110,278 130,278" />
    <polygon points="190,262 180,290 200,290" />
    <polygon points="420,258 410,285 430,285" />
    <polygon points="680,225 670,250 690,250" />
  </g>

  <!-- Deep Valley Fog (Behind Middle Trees) -->
  <g filter="url(#fog-blur)">
    <ellipse cx="200" cy="270" rx="220" ry="60" class="fog-wave" style="animation-duration: 25s;" />
    <ellipse cx="600" cy="240" rx="180" ry="50" class="fog-wave-alt" style="animation-duration: 32s;" />
  </g>

  <!-- Middle Layer Trees (Dark Green/Teal Mossy Silhouettes) -->
  <g fill="#07120e" opacity="0.65">
    <!-- Mid Pines & Deciduous trees -->
    <path d="M 0,330 Q 220,300 450,320 T 800,290 L 800,450 L 0,450 Z" />
    <!-- Tree Silhouettes -->
    <!-- Tree 1 -->
    <path d="M 80,315 L 85,220 L 75,220 L 80,315 Z" />
    <path d="M 80,220 C 60,210 50,180 80,160 C 110,180 100,210 80,220 Z" />
    <!-- Tree 2 (Pine) -->
    <path d="M 520,310 L 523,180 L 517,180 L 520,310 Z" />
    <polygon points="520,160 505,190 535,190" />
    <polygon points="520,180 495,220 545,220" />
    <polygon points="520,210 485,260 555,260" />
    <!-- Tree 3 -->
    <path d="M 710,295 L 714,190 L 706,190 L 710,295 Z" />
    <path d="M 710,190 C 690,180 685,150 710,130 C 735,150 730,180 710,190 Z" />
  </g>

  <!-- Ground Fog / Foremost Valley Mist -->
  <g filter="url(#fog-blur)">
    <ellipse cx="380" cy="340" rx="250" ry="70" class="fog-wave-alt" style="animation-duration: 20s; animation-delay: 1.5s;" />
    <ellipse cx="100" cy="380" rx="150" ry="40" class="fog-wave" style="animation-duration: 26s;" />
  </g>

  <!-- Wet Forest Rain (Diagonal falling streaks) -->
  <g stroke-width="1.2">
    <line x1="80" y1="-50" x2="-20" y2="400" class="rain-streak" style="animation-duration: 2.1s;" />
    <line x1="260" y1="-50" x2="160" y2="400" class="rain-streak" style="animation-duration: 1.7s; animation-delay: 0.3s;" />
    <line x1="420" y1="-50" x2="320" y2="400" class="rain-streak" style="animation-duration: 2.4s; animation-delay: 0.7s;" />
    <line x1="600" y1="-50" x2="500" y2="400" class="rain-streak" style="animation-duration: 1.9s; animation-delay: 0.1s;" />
    <line x1="750" y1="-50" x2="650" y2="400" class="rain-streak" style="animation-duration: 2.2s; animation-delay: 0.5s;" />
    <line x1="180" y1="-50" x2="80" y2="400" class="rain-streak" style="animation-duration: 2.0s; animation-delay: 1.0s;" />
    <line x1="500" y1="-50" x2="400" y2="400" class="rain-streak" style="animation-duration: 1.8s; animation-delay: 1.2s;" />
  </g>

  <!-- Hanging Ancient Forest Canopy (Top Frame) -->
  <g fill="#020504" class="moss-branch">
    <!-- Hanging branch Left -->
    <path d="M 0,0 C 150,0 200,30 250,70 C 200,60 170,40 120,40 C 90,40 70,55 0,30 Z" />
    <path d="M 80,35 C 100,50 110,80 100,90 C 90,95 80,70 70,40 Z" opacity="0.8" />
    <!-- Hanging branch Right -->
    <path d="M 800,0 C 650,0 600,40 520,60 C 580,50 620,30 680,30 C 720,30 740,45 800,20 Z" style="transform-origin: top right; animation: branch-sway 12s infinite ease-in-out;" />
  </g>

  <!-- ================= SUSPENDED GLASSMORPHIC FOREST TABLET ================= -->
  <g transform="translate(180, 75)" class="glass-card">
    <!-- Suspended Ethereal Glow Behind Tablet -->
    <rect x="10" y="10" width="420" height="260" rx="20" fill="#a7f3d0" opacity="0.05" filter="url(#forest-glow)" />

    <!-- Glass tablet background -->
    <rect x="0" y="0" width="440" height="280" rx="20" fill="url(#glass-grad)" stroke="#2d5a45" stroke-width="1.5" stroke-opacity="0.8" />
    
    <!-- Delicate Interior Golden Ornament Line -->
    <rect x="8" y="8" width="424" height="264" rx="12" fill="none" stroke="#6ee7b7" stroke-width="0.8" stroke-opacity="0.3" />

    <!-- Ethereal Forest Branding -->
    <g transform="translate(40, 45)">
      <!-- Star-Spangled Compass / Astrolabe Emblem -->
      <g stroke="#6ee7b7" stroke-width="0.8" fill="none" stroke-opacity="0.5">
        <circle cx="35" cy="35" r="22" />
        <circle cx="35" cy="35" r="18" stroke-dasharray="2 3" />
        <!-- Diagonal Star Lines -->
        <line x1="35" y1="8" x2="35" y2="62" />
        <line x1="8" y1="35" x2="62" y2="35" />
      </g>
      <!-- Glowing Core -->
      <circle cx="35" cy="35" r="3" fill="#6ee7b7" filter="url(#forest-glow)" />

      <!-- Identity Name -->
      <text class="title-text" x="78" y="32" font-size="22" fill="#e2e8f0" filter="url(#forest-glow)">KALI</text>
      <text class="script-text" x="78" y="50" font-size="13" fill="#a7f3d0" font-style="italic">"Quiet Architect of the Greenwoods"</text>

      <line x1="0" y1="75" x2="360" y2="75" stroke="#2d5a45" stroke-width="1.2" stroke-opacity="0.8" />
      <polygon points="180,72 184,75 180,78 176,75" fill="#6ee7b7" />

      <!-- Forest Ledger entries -->
      <g transform="translate(0, 100)">
        <!-- Row 1 -->
        <g transform="translate(10, 0)">
          <text class="small-label" x="0" y="10" fill="#64748b">🌲 CONJURED DOMAIN:</text>
          <text class="script-text" x="0" y="27" font-size="14" font-weight="700" fill="#f1f5f9">Damp Forest &amp; Mossy Undergrowth</text>
          <line x1="0" y1="34" x2="340" y2="34" stroke="#12251c" stroke-width="0.8" />
        </g>
        
        <!-- Row 2 -->
        <g transform="translate(10, 48)">
          <text class="small-label" x="0" y="10" fill="#64748b">⛈️ SYSTEM ATMOSPHERE:</text>
          <text class="script-text" x="0" y="27" font-size="14" font-weight="700" fill="#a7f3d0">Eternal Mist, Rainy Gales &amp; Solitude</text>
          <line x1="0" y1="34" x2="340" y2="34" stroke="#12251c" stroke-width="0.8" />
        </g>

        <!-- Row 3 -->
        <g transform="translate(10, 96)">
          <text class="small-label" x="0" y="10" fill="#64748b">🔮 ALCHEMICAL FOCUS:</text>
          <text class="script-text" x="0" y="27" font-size="13" font-weight="700" fill="#34d399">Fluid Interfaces &amp; Ethereal Architectures</text>
        </g>
      </g>
    </g>
  </g>

  <!-- ================= FOREGROUND DENSE FOREST FLOOR & SWAYING FERNS ================= -->
  <!-- Silhouettes of dense ferns, grass, and mossy hillocks lining the bottom -->
  <g fill="#020604">
    <!-- Earth Base -->
    <path d="M 0,390 Q 200,380 400,395 T 800,370 L 800,450 L 0,450 Z" />
    
    <!-- Swaying Ferns Left -->
    <g class="fern-leaf">
      <path d="M 10,400 C 15,350 40,320 60,300 C 45,330 25,370 10,400 Z" />
      <path d="M 25,370 C 35,340 55,320 70,305 C 55,325 40,350 25,370 Z" opacity="0.9" />
    </g>
    <g class="fern-leaf-delayed">
      <path d="M 60,410 C 70,360 100,335 120,310 C 100,340 80,380 60,410 Z" />
      <path d="M 110,420 C 120,380 145,360 160,340 C 145,365 130,395 110,420 Z" />
    </g>

    <!-- Swaying Ferns Right -->
    <g class="fern-leaf" style="animation-duration: 9s;">
      <path d="M 740,390 C 730,340 700,310 680,290 C 695,320 715,360 740,390 Z" />
      <path d="M 780,410 C 765,360 735,335 715,310 C 735,340 755,380 780,410 Z" />
    </g>
    
    <!-- Center Ferns & Mossy Rocks -->
    <path d="M 320,400 C 340,385 370,380 390,395 C 380,398 335,402 320,400 Z" />
    <path d="M 450,410 C 470,395 500,390 520,405 C 510,408 465,412 450,410 Z" />
    <g class="fern-leaf-delayed">
      <path d="M 380,420 C 385,380 405,360 415,340 C 405,365 395,395 380,420 Z" />
    </g>
  </g>

  <!-- Glowing Fireflies Rising in Wet Forest (Teal/Green glowing embers) -->
  <g fill="#6ee7b7" class="firefly-glow">
    <circle cx="35" cy="320" r="2" />
    <circle cx="85" cy="360" r="1.5" />
    <circle cx="150" cy="330" r="2" style="animation-delay: 1.5s;" />
    <circle cx="280" cy="370" r="2.5" style="animation-delay: 2.2s;" />
    <circle cx="650" cy="340" r="1.8" style="animation-delay: 1.0s;" />
    <circle cx="720" cy="320" r="2" style="animation-delay: 3.0s;" />
    <circle cx="480" cy="380" r="1.5" style="animation-delay: 0.5s;" />
  </g>
</svg>
