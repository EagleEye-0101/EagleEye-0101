<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Deep Ethereal Foggy Night Sky Gradient -->
    <linearGradient id="foggy-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#080a12" />
      <stop offset="50%" stop-color="#141a29" />
      <stop offset="100%" stop-color="#090b10" />
    </linearGradient>

    <!-- Warm Parchment Paper Gradient -->
    <linearGradient id="paper-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fefdfa" />
      <stop offset="60%" stop-color="#f6f0e5" />
      <stop offset="100%" stop-color="#ebdcb9" />
    </linearGradient>

    <!-- Fog Filters for Dreamy/Windy atmosphere -->
    <filter id="fog-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
    </filter>
    
    <filter id="glow-gold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-magic" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800;900&amp;family=Playfair+Display:ital,wght@0,500;0,700;1,400&amp;family=Plus+Jakarta+Sans:wght@500;700&amp;display=swap');
      
      <![CDATA[
      .title-text {
        font-family: 'Cinzel', serif;
        font-weight: 800;
        letter-spacing: 2px;
      }
      
      .script-text {
        font-family: 'Playfair Display', Georgia, serif;
      }
      
      .small-label {
        font-family: 'Cinzel', serif;
        font-weight: 600;
        font-size: 11px;
        letter-spacing: 1.5px;
      }

      /* Rain & Wind Animations */
      .rain-drop {
        stroke: #93c5fd;
        stroke-opacity: 0.25;
        stroke-dasharray: 4 12;
        animation: rain-fall-anim infinite linear;
      }

      .wind-fog {
        fill: #3b82f6;
        fill-opacity: 0.04;
        animation: fog-drift-anim infinite ease-in-out;
      }
      
      .wind-fog-alt {
        fill: #4f46e5;
        fill-opacity: 0.03;
        animation: fog-drift-anim-alt infinite ease-in-out;
      }

      .grass-blade {
        transform-origin: bottom center;
        animation: sway-anim 6s infinite ease-in-out;
      }

      .grass-blade-fast {
        transform-origin: bottom center;
        animation: sway-anim 4.5s infinite ease-in-out 1s;
      }

      .star-fade {
        animation: star-fade-anim 4s infinite ease-in-out;
      }
      
      .star-fade-delayed {
        animation: star-fade-anim 5s infinite ease-in-out 2s;
      }

      .book-float {
        animation: book-float-anim 7s infinite ease-in-out;
      }

      .glow-pulse {
        animation: glow-pulse-anim 4s infinite ease-in-out;
      }

      /* Animation Definitions */
      @keyframes rain-fall-anim {
        0% { stroke-dashoffset: 100; transform: translate(0, -150px); opacity: 0; }
        30% { opacity: 0.6; }
        90% { opacity: 0.6; }
        100% { stroke-dashoffset: -300; transform: translate(-50px, 450px); opacity: 0; }
      }

      @keyframes fog-drift-anim {
        0% { transform: translate(-100px, 20px) scale(1); opacity: 0; }
        40% { opacity: 0.25; }
        70% { opacity: 0.25; }
        100% { transform: translate(650px, -20px) scale(1.3); opacity: 0; }
      }

      @keyframes fog-drift-anim-alt {
        0% { transform: translate(-150px, 100px) scale(1.2); opacity: 0; }
        50% { opacity: 0.2; }
        80% { opacity: 0.2; }
        100% { transform: translate(600px, 50px) scale(0.9); opacity: 0; }
      }

      @keyframes sway-anim {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(3.5deg); }
      }

      @keyframes star-fade-anim {
        0%, 100% { opacity: 0.1; }
        50% { opacity: 0.9; }
      }

      @keyframes book-float-anim {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-7px) rotate(0.4deg); }
      }

      @keyframes glow-pulse-anim {
        0%, 100% { filter: drop-shadow(0 0 1px #ebdcb9) opacity(0.5); }
        50% { filter: drop-shadow(0 0 8px #ffd700) opacity(0.95); }
      }
      ]]>
    </style>
  </defs>

  <!-- Canvas Background -->
  <rect width="800" height="450" rx="24" fill="url(#foggy-sky)" stroke="#1e293b" stroke-width="2" />

  <!-- Ethereal Whispering Winds & Moving Fog -->
  <g filter="url(#fog-blur)">
    <!-- Fog bank 1 -->
    <ellipse cx="200" cy="225" rx="150" ry="80" class="wind-fog" style="animation-duration: 22s;" />
    <!-- Fog bank 2 -->
    <ellipse cx="400" cy="150" rx="180" ry="90" class="wind-fog-alt" style="animation-duration: 28s;" />
    <!-- Fog bank 3 -->
    <ellipse cx="100" cy="350" rx="120" ry="70" class="wind-fog" style="animation-duration: 18s;" />
  </g>

  <!-- Quiet Falling Rain (Diagonal, Wind-swept) -->
  <g stroke-width="1">
    <line x1="120" y1="0" x2="20" y2="400" class="rain-drop" style="animation-duration: 2.2s;" />
    <line x1="300" y1="0" x2="200" y2="400" class="rain-drop" style="animation-duration: 1.8s; animation-delay: 0.4s;" />
    <line x1="450" y1="0" x2="350" y2="400" class="rain-drop" style="animation-duration: 2.5s; animation-delay: 0.8s;" />
    <line x1="650" y1="0" x2="550" y2="400" class="rain-drop" style="animation-duration: 2.0s; animation-delay: 0.2s;" />
    <line x1="780" y1="0" x2="680" y2="400" class="rain-drop" style="animation-duration: 2.3s; animation-delay: 0.6s;" />
    <line x1="220" y1="0" x2="120" y2="400" class="rain-drop" style="animation-duration: 2.1s; animation-delay: 1.1s;" />
    <line x1="550" y1="0" x2="450" y2="400" class="rain-drop" style="animation-duration: 1.9s; animation-delay: 1.3s;" />
  </g>

  <!-- Soft Starfield -->
  <g fill="#ffffff">
    <circle cx="80" cy="60" r="1.2" class="star-fade" />
    <circle cx="280" cy="50" r="1.5" class="star-fade-delayed" fill="#ffd700" />
    <circle cx="670" cy="80" r="1" class="star-fade" />
    <circle cx="720" cy="140" r="1.8" class="star-fade-delayed" />
    <circle cx="500" cy="40" r="1" class="star-fade" fill="#ffd700" />
  </g>

  <!-- Celestial Coordinate Grid (Astrology Map) -->
  <g stroke="#dfc593" stroke-width="0.5" fill="none" opacity="0.08">
    <circle cx="400" cy="225" r="200" />
    <circle cx="400" cy="225" r="130" stroke-dasharray="3 5" />
    <line x1="200" y1="225" x2="600" y2="225" />
    <line x1="400" y1="25" x2="400" y2="425" />
  </g>

  <!-- ================= ANCIENT PARCHMENT JOURNAL (CENTERED & FLOATING) ================= -->
  <g transform="translate(100, 50)" class="book-float">
    <!-- Ethereal Back Light Glow -->
    <rect x="10" y="10" width="580" height="320" rx="14" fill="#3b82f6" opacity="0.08" filter="url(#glow-magic)" />
    <rect x="-8" y="12" width="616" height="326" rx="10" fill="rgba(0,0,0,0.3)" filter="url(#glow-magic)" />

    <!-- Open Book Binding -->
    <rect x="-4" y="2" width="608" height="326" rx="8" fill="#381d0f" stroke="#1d0a02" stroke-width="2" />
    <rect x="0" y="6" width="600" height="318" rx="6" fill="#4d2914" />

    <!-- Book Page Left (Parchment Paper) -->
    <rect x="8" y="12" width="288" height="306" rx="4" fill="url(#paper-grad)" />
    <!-- Page Left Borders -->
    <rect x="16" y="20" width="272" height="290" rx="2" fill="none" stroke="#dfc593" stroke-width="0.8" opacity="0.5" />
    <rect x="20" y="24" width="264" height="282" rx="2" fill="none" stroke="#ebdcb9" stroke-width="1.2" opacity="0.8" />

    <!-- Book Page Right (Parchment Paper) -->
    <rect x="304" y="12" width="288" height="306" rx="4" fill="url(#paper-grad)" />
    <!-- Page Right Borders -->
    <rect x="312" y="20" width="272" height="290" rx="2" fill="none" stroke="#dfc593" stroke-width="0.8" opacity="0.5" />
    <rect x="316" y="24" width="264" height="282" rx="2" fill="none" stroke="#ebdcb9" stroke-width="1.2" opacity="0.8" />

    <!-- Spine Shadow -->
    <rect x="296" y="12" width="8" height="306" fill="rgba(0,0,0,0.15)" />
    <line x1="300" y1="12" x2="300" y2="318" stroke="rgba(0,0,0,0.3)" stroke-width="1.5" />

    <!-- ================= LEFT PAGE: KALI'S CELESTIAL LOGO ================= -->
    <g transform="translate(42, 38)">
      <!-- Starry Circle Frame -->
      <circle cx="110" cy="75" r="48" fill="#fdfbf7" stroke="#312e81" stroke-width="0.8" stroke-opacity="0.25" />
      <circle cx="110" cy="75" r="44" fill="none" stroke="#dfc593" stroke-width="1.2" stroke-dasharray="5 3" />
      
      <!-- Hand-drawn style soaring Eagle/Patronus vector -->
      <path d="M 110,45 
               C 113,58 132,62 144,55 
               C 134,68 134,80 144,91 
               C 157,88 163,95 173,92
               C 147,112 131,108 122,128
               C 128,141 134,154 105,141
               C 76,154 82,141 88,128
               C 79,108 63,112 37,92
               C 47,95 53,88 66,91
               C 76,80 76,68 66,55
               C 78,62 97,58 110,45 Z" 
            fill="#312e81" fill-opacity="0.08" stroke="#1e293b" stroke-width="1" stroke-opacity="0.6" />
      
      <!-- Golden core sparkles in bird -->
      <circle cx="110" cy="75" r="2.5" fill="#dfc593" />
      <polygon points="110,47 113,53 119,53 114,57 116,63 110,60 104,63 106,57 101,53 107,53" fill="#dfc593" opacity="0.6" />

      <!-- Title & Signature -->
      <text class="title-text" x="110" y="145" font-size="16" fill="#1c1917" text-anchor="middle" opacity="0.9" filter="url(#glow-gold)">KALI</text>
      <text class="script-text" x="110" y="162" font-size="12" fill="#57534e" text-anchor="middle" font-style="italic">"Expecto Patronum"</text>

      <line x1="30" y1="178" x2="190" y2="178" stroke="#dfc593" stroke-width="1.2" />
      <polygon points="110,175 113,178 110,181 107,178" fill="#dfc593" />

      <!-- Badges on Left Page -->
      <g transform="translate(10, 194)">
        <rect x="0" y="0" width="90" height="20" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="0.8" />
        <circle cx="10" cy="10" r="3" fill="#2563eb" />
        <text class="small-label" x="20" y="13" font-size="8" fill="#1e40af">RAVENCLAW</text>

        <rect x="100" y="0" width="90" height="20" rx="10" fill="#fdf8e6" stroke="#d97706" stroke-width="0.8" />
        <circle cx="110" cy="10" r="3" fill="#b45309" />
        <text class="small-label" x="120" y="13" font-size="8" fill="#78350f">ELDER WAND</text>
      </g>
    </g>

    <!-- ================= RIGHT PAGE: PROFESSIONAL LEDGER ENTRIES ================= -->
    <g transform="translate(340, 38)">
      <text class="title-text" x="108" y="24" font-size="13" fill="#1c1917" text-anchor="middle" filter="url(#glow-gold)">SPECTRAL MEMOIRS</text>
      <line x1="28" y1="34" x2="188" y2="34" stroke="#dfc593" stroke-width="1.5" />
      
      <!-- Hand-written ledger details -->
      <g transform="translate(0, 52)">
        
        <!-- Entry 1: Core Affinity -->
        <g transform="translate(10, 0)">
          <text class="small-label" x="0" y="12" fill="#78716c">🏰 CELESTIAL ALIGNMENT:</text>
          <text class="script-text" x="0" y="28" font-size="13" font-weight="700" fill="#1c1917">Full-Stack Alchemist / Developer</text>
          <line x1="0" y1="35" x2="200" y2="35" stroke="#e7e5e4" stroke-dasharray="2 2" />
        </g>

        <!-- Entry 2: Magic Fields -->
        <g transform="translate(10, 48)">
          <text class="small-label" x="0" y="12" fill="#78716c">🪄 TRANSCENDENT focus:</text>
          <text class="script-text" x="0" y="28" font-size="13" font-weight="700" fill="#1c1917">Ethereal UIs &amp; Magic Systems</text>
          <line x1="0" y1="35" x2="200" y2="35" stroke="#e7e5e4" stroke-dasharray="2 2" />
        </g>

        <!-- Entry 3: Focus -->
        <g transform="translate(10, 96)">
          <text class="small-label" x="0" y="12" fill="#78716c">🌌 CHOSEN CHRONICLE:</text>
          <text class="script-text" x="0" y="28" font-size="13" font-weight="700" fill="#0369a1" font-style="italic">Weaving Wind, Rain &amp; Clean Code</text>
          <line x1="0" y1="35" x2="200" y2="35" stroke="#e7e5e4" stroke-dasharray="2 2" />
        </g>

        <!-- Entry 4: active spells -->
        <g transform="translate(10, 144)">
          <text class="small-label" x="0" y="12" fill="#78716c">🔮 SIGNATURE CHARM:</text>
          <text class="script-text" x="0" y="28" font-size="13" font-weight="700" fill="#b45309">Expecto Clean Code! ⚡</text>
          <line x1="0" y1="35" x2="200" y2="35" stroke="#e7e5e4" stroke-dasharray="2 2" />
        </g>

        <!-- Entry 5: magic engine -->
        <g transform="translate(10, 192)">
          <text class="small-label" x="0" y="12" fill="#78716c">🍃 SYSTEM FOCUS:</text>
          <text class="script-text" x="0" y="28" font-size="12" font-weight="700" fill="#047857">Dreamy Interactive Design</text>
        </g>

      </g>
    </g>
  </g>

  <!-- ================= GENTLY SWAYING GRASS AT BOTTOM (RAINY/GRASSY VIBE) ================= -->
  <!-- Silhouettes of swaying grass blades lining the bottom edge -->
  <g fill="#14261c" opacity="0.5">
    <!-- Blade 1 -->
    <path d="M 0,450 C 15,410 25,400 30,380 C 27,400 15,425 0,450 Z" class="grass-blade" />
    <!-- Blade 2 -->
    <path d="M 40,450 C 50,420 70,410 75,395 C 65,415 50,430 40,450 Z" class="grass-blade-fast" />
    <!-- Blade 3 -->
    <path d="M 120,450 C 125,415 140,405 150,385 C 135,410 125,430 120,450 Z" class="grass-blade" />
    <!-- Blade 4 -->
    <path d="M 210,450 C 220,425 245,415 250,400 C 235,420 220,435 210,450 Z" class="grass-blade-fast" />
    <!-- Blade 5 -->
    <path d="M 310,450 C 315,410 330,400 335,375 C 325,405 315,425 310,450 Z" class="grass-blade" />
    <!-- Blade 6 -->
    <path d="M 450,450 C 460,420 480,415 485,390 C 475,410 460,430 450,450 Z" class="grass-blade-fast" />
    <!-- Blade 7 -->
    <path d="M 580,450 C 590,410 610,400 615,380 C 605,405 590,425 580,450 Z" class="grass-blade" />
    <!-- Blade 8 -->
    <path d="M 690,450 C 700,425 725,410 730,395 C 715,415 700,430 690,450 Z" class="grass-blade-fast" />
    <!-- Blade 9 -->
    <path d="M 760,450 C 770,415 790,405 800,385 C 785,410 770,430 760,450 Z" class="grass-blade" />
  </g>

  <!-- Lighter Green Overlay Grass for Depth -->
  <g fill="#213a29" opacity="0.7">
    <!-- Blade 1b -->
    <path d="M 20,450 C 25,420 35,410 40,395 C 35,415 25,430 20,450 Z" class="grass-blade-fast" />
    <!-- Blade 2b -->
    <path d="M 80,450 C 90,425 105,420 110,400 C 100,420 90,435 80,450 Z" class="grass-blade" />
    <!-- Blade 3b -->
    <path d="M 170,450 C 175,415 190,410 195,390 C 185,410 175,430 170,450 Z" class="grass-blade-fast" />
    <!-- Blade 4b -->
    <path d="M 270,450 C 275,420 290,415 295,395 C 285,415 275,430 270,450 Z" class="grass-blade" />
    <!-- Blade 5b -->
    <path d="M 390,450 C 395,415 410,405 415,385 C 405,410 395,430 390,450 Z" class="grass-blade-fast" />
    <!-- Blade 6b -->
    <path d="M 520,450 C 525,420 540,415 545,395 C 535,415 525,430 520,450 Z" class="grass-blade" />
    <!-- Blade 7b -->
    <path d="M 640,450 C 645,425 660,420 665,400 C 655,420 645,435 640,450 Z" class="grass-blade-fast" />
    <!-- Blade 8b -->
    <path d="M 730,450 C 735,420 750,415 755,390 C 745,410 735,430 730,450 Z" class="grass-blade" />
  </g>

  <!-- Glowing Stardust/Fireflies floating in Grass -->
  <g fill="#ffd700" class="glow-pulse">
    <circle cx="50" cy="410" r="1.5" />
    <circle cx="140" cy="420" r="2.5" />
    <circle cx="230" cy="390" r="1.5" />
    <circle cx="320" cy="430" r="2.0" />
    <circle cx="490" cy="405" r="2.5" />
    <circle cx="600" cy="425" r="1.5" />
    <circle cx="710" cy="395" r="2.0" />
  </g>
</svg>
