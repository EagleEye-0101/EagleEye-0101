<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Damp Moody Forest Dawn/Twilight Gradient -->
    <linearGradient id="forest-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#080c14" />
      <stop offset="35%" stop-color="#0f1f24" />
      <stop offset="70%" stop-color="#0a1d15" />
      <stop offset="100%" stop-color="#030805" />
    </linearGradient>

    <!-- Natural Soft Sunlight (Diffuse God Ray) -->
    <linearGradient id="diffuse-light" x1="50%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ecfdf5" stop-opacity="0.14" />
      <stop offset="60%" stop-color="#a7f3d0" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#030805" stop-opacity="0" />
    </linearGradient>

    <!-- Heavy Organic Fog Filter -->
    <filter id="heavy-fog" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="24" result="blur" />
    </filter>

    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&amp;family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;family=Plus+Jakarta+Sans:wght@400;600&amp;display=swap');
      
      <![CDATA[
      .forest-title {
        font-family: 'Cinzel', serif;
        font-weight: 700;
        letter-spacing: 4px;
        fill: #f1f5f9;
      }
      
      .forest-subtitle {
        font-family: 'Playfair Display', Georgia, serif;
        font-style: italic;
        fill: #a7f3d0;
      }
      
      .forest-text {
        font-family: 'Playfair Display', Georgia, serif;
        fill: #e2e8f0;
      }

      /* Slow, Peaceful Nature Animations */
      .mist-layer-1 {
        fill: #10b981;
        fill-opacity: 0.04;
        animation: mist-drift-slow 28s infinite ease-in-out;
      }
      
      .mist-layer-2 {
        fill: #3b82f6;
        fill-opacity: 0.03;
        animation: mist-drift-alt 36s infinite ease-in-out;
      }

      .mist-layer-3 {
        fill: #059669;
        fill-opacity: 0.04;
        animation: mist-drift-slow 22s infinite ease-in-out 3s;
      }

      .damp-rain {
        stroke: #cbd5e1;
        stroke-opacity: 0.12;
        stroke-dasharray: 4 15;
        animation: rain-fall infinite linear;
      }

      .mossy-branch-sway {
        transform-origin: top left;
        animation: branch-sway 12s infinite ease-in-out;
      }

      .mossy-branch-sway-right {
        transform-origin: top right;
        animation: branch-sway-alt 14s infinite ease-in-out;
      }

      .fern-sway-left {
        transform-origin: bottom center;
        animation: plant-sway 8s infinite ease-in-out;
      }

      .fern-sway-right {
        transform-origin: bottom center;
        animation: plant-sway-alt 9s infinite ease-in-out;
      }

      .light-ray-pulse {
        animation: ray-pulse 8s infinite ease-in-out;
      }

      .firefly-glow {
        animation: firefly-pulse-anim 5s infinite ease-in-out;
      }

      /* Core Keyframes */
      @keyframes rain-fall {
        0% { stroke-dashoffset: 100; transform: translate(0, -120px); opacity: 0; }
        25% { opacity: 0.5; }
        85% { opacity: 0.5; }
        100% { stroke-dashoffset: -300; transform: translate(-30px, 450px); opacity: 0; }
      }

      @keyframes mist-drift-slow {
        0% { transform: translate(-180px, 40px) scale(1); opacity: 0; }
        35% { opacity: 0.35; }
        75% { opacity: 0.35; }
        100% { transform: translate(720px, -10px) scale(1.3); opacity: 0; }
      }

      @keyframes mist-drift-alt {
        0% { transform: translate(-220px, 100px) scale(1.25); opacity: 0; }
        45% { opacity: 0.28; }
        80% { opacity: 0.28; }
        100% { transform: translate(680px, 60px) scale(0.9); opacity: 0; }
      }

      @keyframes branch-sway {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(1deg); }
      }

      @keyframes branch-sway-alt {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(-0.8deg); }
      }

      @keyframes plant-sway {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(2.5deg); }
      }

      @keyframes plant-sway-alt {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(-2deg); }
      }

      @keyframes ray-pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.95; }
      }

      @keyframes firefly-pulse-anim {
        0%, 100% { opacity: 0.15; transform: scale(0.85); }
        50% { opacity: 0.9; transform: scale(1.15); }
      }
      ]]>
    </style>
  </defs>

  <!-- Deep Forest Sanctuary Canvas -->
  <rect width="800" height="450" rx="24" fill="url(#forest-sky)" stroke="#0b120f" stroke-width="2" />

  <!-- Soft Diffuse Sunlight Beaming from Top-Center -->
  <polygon points="350,0 600,0 800,450 100,450" fill="url(#diffuse-light)" class="light-ray-pulse" />
  <polygon points="150,0 350,0 100,450 0,450" fill="url(#diffuse-light)" class="light-ray-pulse" style="animation-delay: 2.5s; opacity: 0.4;" />

  <!-- Distant Layer: Ancient Mountainous Ridges (Foggy Backdrop) -->
  <g fill="#08100c" opacity="0.25">
    <path d="M 0,290 Q 200,260 400,275 T 800,240 L 800,450 L 0,450 Z" />
    <polygon points="80,265 72,290 88,290" />
    <polygon points="140,260 132,285 148,285" />
    <polygon points="320,270 312,295 328,295" />
    <polygon points="690,245 682,270 698,270" />
  </g>

  <!-- Low-lying Valley Fog (Deep) -->
  <g filter="url(#heavy-fog)">
    <ellipse cx="250" cy="275" rx="250" ry="70" class="mist-layer-1" />
    <ellipse cx="650" cy="250" rx="200" ry="60" class="mist-layer-2" />
  </g>

  <!-- Midground Layer: Ancient Mossy Tree Trunks & Branch Silhouettes (Teal/Green Shadow) -->
  <g fill="#050e0a" opacity="0.7">
    <path d="M 0,335 Q 240,310 480,325 T 800,305 L 800,450 L 0,450 Z" />
    
    <!-- Organic Mossy Tree Trunk Left -->
    <path d="M 95,330 C 95,240 105,180 85,150 C 75,135 60,110 50,70 L 65,70 C 75,100 85,120 95,140 C 110,170 110,230 110,330 Z" />
    <!-- Mossy branch growing from left trunk -->
    <path d="M 95,180 C 120,180 140,165 160,150 C 140,160 120,170 95,172 Z" />
    
    <!-- Organic Mossy Tree Trunk Right (Deciduous Oak Style) -->
    <path d="M 680,320 C 675,250 660,200 680,150 C 690,125 710,95 720,50 L 735,50 C 725,90 705,120 695,145 C 675,190 690,250 695,320 Z" />
    
    <!-- Midground Pines -->
    <polygon points="410,240 395,325 425,325" />
    <polygon points="560,250 545,320 575,320" />
  </g>

  <!-- Heavy Midground Mist -->
  <g filter="url(#heavy-fog)">
    <ellipse cx="400" cy="330" rx="280" ry="80" class="mist-layer-3" />
    <ellipse cx="150" cy="350" rx="180" ry="60" class="mist-layer-1" style="animation-delay: 2s;" />
  </g>

  <!-- Soft Whispering Rain Streaks -->
  <g stroke-width="1">
    <line x1="100" y1="-50" x2="30" y2="400" class="damp-rain" style="animation-duration: 2.2s;" />
    <line x1="280" y1="-50" x2="210" y2="400" class="damp-rain" style="animation-duration: 1.8s; animation-delay: 0.4s;" />
    <line x1="460" y1="-50" x2="390" y2="400" class="damp-rain" style="animation-duration: 2.5s; animation-delay: 0.8s;" />
    <line x1="640" y1="-50" x2="570" y2="400" class="damp-rain" style="animation-duration: 2.0s; animation-delay: 0.2s;" />
    <line x1="780" y1="-50" x2="710" y2="400" class="damp-rain" style="animation-duration: 2.3s; animation-delay: 0.6s;" />
    <line x1="200" y1="-50" x2="130" y2="400" class="damp-rain" style="animation-duration: 2.1s; animation-delay: 1.1s;" />
    <line x1="550" y1="-50" x2="480" y2="400" class="damp-rain" style="animation-duration: 1.9s; animation-delay: 1.3s;" />
  </g>

  <!-- Hanging Canopy & Moss Clusters (Foreground Top Frame) -->
  <g fill="#010403" class="mossy-branch-sway">
    <!-- Hanging Mossy Canopy Left -->
    <path d="M 0,0 C 180,0 240,40 290,90 C 230,80 190,50 130,50 C 90,50 60,65 0,35 Z" />
    <path d="M 120,48 C 135,65 145,95 130,110 C 115,115 105,85 90,50 Z" opacity="0.85" />
    <path d="M 50,30 C 65,50 75,80 65,95 C 55,100 45,75 35,35 Z" opacity="0.75" />
  </g>
  <g fill="#010403" class="mossy-branch-sway-right">
    <!-- Hanging Mossy Canopy Right -->
    <path d="M 800,0 C 620,0 560,50 490,75 C 560,65 600,40 670,40 C 710,40 740,55 800,25 Z" />
    <path d="M 550,65 C 565,85 575,115 560,130 C 545,135 535,105 520,70 Z" opacity="0.8" />
  </g>

  <!-- Foreground Floor: Wet Ferns, Moss & Swaying Undergrowth -->
  <g fill="#010302">
    <path d="M 0,395 Q 200,380 400,398 T 800,380 L 800,450 L 0,450 Z" />
    
    <!-- Swaying Mossy Ferns Left -->
    <g class="fern-sway-left">
      <path d="M 15,405 C 20,350 50,315 75,295 C 55,325 35,370 15,405 Z" />
      <path d="M 35,375 C 45,340 70,315 90,295 C 70,320 50,350 35,375 Z" opacity="0.85" />
    </g>
    <g class="fern-sway-right" style="animation-delay: 1.2s;">
      <path d="M 75,415 C 85,360 115,335 140,310 C 115,340 95,380 75,415 Z" />
      <path d="M 130,425 C 140,385 170,360 190,340 C 170,365 150,395 130,425 Z" opacity="0.8" />
    </g>

    <!-- Swaying Mossy Ferns Right -->
    <g class="fern-sway-right">
      <path d="M 735,395 C 725,340 695,310 670,290 C 685,320 705,360 735,395 Z" />
      <path d="M 775,415 C 760,360 730,335 710,310 C 730,340 750,380 775,415 Z" opacity="0.85" />
    </g>
  </g>

  <!-- ================= SEAMLESS ETHEREAL TYPOGRAPHY (WRITTEN ON MIST) ================= -->
  <!-- Floating in the center, integrated into the environment with zero borders or neons -->
  <g transform="translate(200, 110)" class="light-ray-pulse" style="animation-duration: 7s;">
    <!-- Minimal dropshadow behind text for readability over mist -->
    <g filter="url(#soft-glow)">
      <!-- Name -->
      <text class="forest-title" x="200" y="40" font-size="28" text-anchor="middle">KALI</text>
      <!-- Subtitle -->
      <text class="forest-subtitle" x="200" y="65" font-size="14" text-anchor="middle">"Wanderer of the Quiet Greenwoods"</text>
      
      <!-- Minimalist separator -->
      <line x1="80" y1="85" x2="320" y2="85" stroke="#a7f3d0" stroke-opacity="0.3" stroke-width="1.2" />
      
      <!-- Quiet ledger entries directly on mist -->
      <text class="forest-text" x="200" y="118" font-size="14" text-anchor="middle" font-weight="700">🌲 Unreal Engine Alchemist</text>
      <text class="forest-text" x="200" y="145" font-size="14" text-anchor="middle" font-weight="700">💻 Full-Stack System Architect</text>
      
      <text class="forest-subtitle" x="200" y="185" font-size="12" text-anchor="middle" opacity="0.8">"In the heart of the damp moss, order grows quietly."</text>
    </g>
  </g>

  <!-- Damp Greenwood Fireflies (Teal/Green glowing embers) -->
  <g fill="#a7f3d0" class="firefly-glow">
    <circle cx="45" cy="330" r="1.8" />
    <circle cx="95" cy="370" r="1.2" />
    <circle cx="160" cy="340" r="2.2" style="animation-delay: 1.5s;" />
    <circle cx="310" cy="375" r="2" style="animation-delay: 2.2s;" />
    <circle cx="630" cy="330" r="1.8" style="animation-delay: 1.0s;" />
    <circle cx="710" cy="310" r="2" style="animation-delay: 3.0s;" />
    <circle cx="480" cy="385" r="1.5" style="animation-delay: 0.5s;" />
  </g>
</svg>
