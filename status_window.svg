<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Soft, Calm, Hazy Space Gradient -->
    <linearGradient id="sky-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090b16" />
      <stop offset="40%" stop-color="#12162d" />
      <stop offset="80%" stop-color="#211a37" />
      <stop offset="100%" stop-color="#0c0e18" />
    </linearGradient>

    <!-- Warm Parchment Gradients -->
    <linearGradient id="parchment-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdfbf7" />
      <stop offset="70%" stop-color="#f5efe2" />
      <stop offset="100%" stop-color="#ebdcb9" />
    </linearGradient>

    <linearGradient id="book-shadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.15)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0.4)" />
    </linearGradient>

    <!-- Soft Gold Glow -->
    <filter id="soft-gold-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="magic-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&amp;family=Playfair+Display:ital,wght@0,500;0,700;1,400&amp;family=Plus+Jakarta+Sans:wght@500;600&amp;display=swap');
      
      <![CDATA[
      .header-font {
        font-family: 'Cinzel', serif;
        font-weight: 700;
        letter-spacing: 2px;
      }
      
      .handwritten-font {
        font-family: 'Playfair Display', Georgia, serif;
      }
      
      .label-font {
        font-family: 'Cinzel', serif;
        font-weight: 500;
        font-size: 11px;
        letter-spacing: 1px;
      }

      /* Slow, Calm Ethereal Animations */
      .star-blink {
        animation: calm-blink-anim 4s infinite ease-in-out;
      }
      
      .star-blink-delayed {
        animation: calm-blink-anim 5s infinite ease-in-out 1.5s;
      }

      .float-gentle {
        animation: float-gentle-anim 8s infinite ease-in-out;
      }

      .sparkle-pulse {
        animation: sparkle-pulse-anim 3.5s infinite ease-in-out;
      }

      @keyframes calm-blink-anim {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 0.85; }
      }

      @keyframes float-gentle-anim {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-5px) rotate(0.5deg); }
      }

      @keyframes sparkle-pulse-anim {
        0%, 100% { opacity: 0.4; filter: drop-shadow(0 0 1px #ebdcb9); }
        50% { opacity: 0.95; filter: drop-shadow(0 0 6px #ffd700); }
      }
      ]]>
    </style>
  </defs>

  <!-- Deep Starry Night Background -->
  <rect width="800" height="450" rx="20" fill="url(#sky-grad)" stroke="#272e4b" stroke-width="1.5" />
  
  <!-- Soft Nebulous Aura -->
  <circle cx="400" cy="225" r="300" fill="#443266" opacity="0.15" filter="url(#magic-glow)" />
  <circle cx="180" cy="180" r="180" fill="#1b2a4a" opacity="0.2" filter="url(#magic-glow)" />

  <!-- Calm Stellar Constellations -->
  <g fill="none" stroke="#e0e7ff" stroke-width="0.5" opacity="0.2">
    <!-- Star lines (Astrological Map) -->
    <line x1="80" y1="80" x2="160" y2="60" />
    <line x1="160" y1="60" x2="220" y2="90" />
    <line x1="220" y1="90" x2="150" y2="150" />
    <line x1="150" y1="150" x2="80" y2="80" />
    
    <line x1="720" y1="100" x2="650" y2="140" />
    <line x1="650" y1="140" x2="680" y2="210" />
    
    <line x1="100" y1="360" x2="180" y2="390" />
    <line x1="180" y1="390" x2="240" y2="340" />
  </g>
  
  <!-- Blinking Constellation Stars -->
  <g fill="#ffffff">
    <circle cx="80" cy="80" r="1.5" class="star-blink" />
    <circle cx="160" cy="60" r="2.5" class="star-blink-delayed" fill="#ffd700" />
    <circle cx="220" cy="90" r="1.2" class="star-blink" />
    <circle cx="150" cy="150" r="2" class="star-blink-delayed" />
    <circle cx="720" cy="100" r="2" class="star-blink" fill="#ffd700" />
    <circle cx="650" cy="140" r="1.5" class="star-blink-delayed" />
    <circle cx="680" cy="210" r="2.5" class="star-blink" />
    <circle cx="100" cy="360" r="1.2" class="star-blink-delayed" />
    <circle cx="180" cy="390" r="2" class="star-blink" fill="#ffd700" />
    <circle cx="240" cy="340" r="1.5" class="star-blink-delayed" />
  </g>

  <!-- Quiet Starfield -->
  <g fill="#ffffff" opacity="0.3">
    <circle cx="340" cy="40" r="0.8" class="star-blink" />
    <circle cx="480" cy="50" r="1" class="star-blink-delayed" />
    <circle cx="560" cy="25" r="0.6" class="star-blink" />
    <circle cx="450" cy="410" r="0.8" class="star-blink-delayed" />
    <circle cx="380" cy="390" r="1" class="star-blink" />
  </g>

  <!-- Soft Golden Celestial Star Chart Circles -->
  <g stroke="#ffd700" stroke-width="0.5" fill="none" opacity="0.12">
    <circle cx="400" cy="225" r="190" />
    <circle cx="400" cy="225" r="185" stroke-dasharray="2 4" />
    <circle cx="400" cy="225" r="120" />
  </g>

  <!-- Outer Frame: Calm Ornate Corners -->
  <g stroke="#ffd700" stroke-width="1" fill="none" opacity="0.3" class="sparkle-pulse">
    <!-- Top-Left corner -->
    <path d="M 25,50 L 25,25 L 50,25" />
    <circle cx="25" cy="25" r="3" fill="#ffd700" />
    <!-- Top-Right corner -->
    <path d="M 775,50 L 775,25 L 750,25" />
    <circle cx="775" cy="25" r="3" fill="#ffd700" />
    <!-- Bottom-Left corner -->
    <path d="M 25,400 L 25,425 L 50,425" />
    <circle cx="25" cy="425" r="3" fill="#ffd700" />
    <!-- Bottom-Right corner -->
    <path d="M 775,400 L 775,425 L 750,425" />
    <circle cx="775" cy="425" r="3" fill="#ffd700" />
  </g>

  <!-- ================= ANCIENT WIZARDING SPELLBOOK (CENTERED & FLOATING) ================= -->
  <g transform="translate(100, 55)" class="float-gentle">
    <!-- Book Shadow -->
    <rect x="-10" y="15" width="620" height="340" rx="12" fill="url(#book-shadow)" filter="url(#magic-glow)" />

    <!-- Open Book Leather Cover back -->
    <rect x="-4" y="2" width="608" height="336" rx="8" fill="#422212" stroke="#251206" stroke-width="2" />
    <rect x="0" y="6" width="600" height="328" rx="6" fill="#5c341a" />

    <!-- Book Page Left (Parchment) -->
    <rect x="8" y="12" width="288" height="316" rx="4" fill="url(#parchment-grad)" />
    <!-- Page Left - Innermost gold border -->
    <rect x="16" y="20" width="272" height="300" rx="2" fill="none" stroke="#dfc593" stroke-width="0.8" opacity="0.6" />
    <rect x="20" y="24" width="264" height="292" rx="2" fill="none" stroke="#ebdcb9" stroke-width="1.5" opacity="0.8" />

    <!-- Book Page Right (Parchment) -->
    <rect x="304" y="12" width="288" height="316" rx="4" fill="url(#parchment-grad)" />
    <!-- Page Right - Innermost gold border -->
    <rect x="312" y="20" width="272" height="300" rx="2" fill="none" stroke="#dfc593" stroke-width="0.8" opacity="0.6" />
    <rect x="316" y="24" width="264" height="292" rx="2" fill="none" stroke="#ebdcb9" stroke-width="1.5" opacity="0.8" />

    <!-- Book Spine center shadow crease -->
    <rect x="296" y="12" width="8" height="316" fill="rgba(0,0,0,0.15)" />
    <line x1="300" y1="12" x2="300" y2="328" stroke="rgba(0,0,0,0.3)" stroke-width="1.5" />

    <!-- ================= LEFT PAGE: CELESTIAL SYMBOLISM & REGISTRY ================= -->
    <!-- Sketch Frame (Manga/Comic hand-drawn aesthetic border) -->
    <g transform="translate(42, 45)">
      <!-- Circle Frame for Eagle/Owl Emblem -->
      <circle cx="110" cy="80" r="50" fill="#fdfbf7" stroke="#312e81" stroke-width="1" stroke-opacity="0.3" />
      <circle cx="110" cy="80" r="46" fill="none" stroke="#dfc593" stroke-width="1.5" stroke-dasharray="6 3" />
      
      <!-- Hand-drawn style Eagle Silhouette -->
      <!-- Soft Ethereal Flying Eagle Sketch -->
      <path d="M 110,48 
               C 114,62 135,66 148,58 
               C 137,72 137,86 148,97 
               C 162,94 169,101 180,98
               C 152,119 135,115 125,136
               C 132,150 139,164 107,150
               C 75,164 82,150 89,136
               C 79,115 62,119 34,98
               C 45,101 52,94 66,97
               C 77,86 77,72 66,58
               C 79,66 100,62 110,48 Z" 
            fill="#1e293b" fill-opacity="0.1" stroke="#2e3c54" stroke-width="1" stroke-opacity="0.65" />
      
      <circle cx="110" cy="80" r="2.5" fill="#dfc593" />
      <polygon points="110,50 114,57 121,57 115,62 117,69 110,65 103,69 105,62 99,57 106,57" fill="#dfc593" opacity="0.6" />

      <!-- Hogwarts Seal text -->
      <text class="header-font" x="110" y="152" font-size="14" fill="#1e293b" text-anchor="middle" font-weight="900" opacity="0.9">EAGLEEYE</text>
      <text class="handwritten-font" x="110" y="170" font-size="12" fill="#57534e" text-anchor="middle" font-style="italic">"Expecto Coding"</text>

      <!-- Delicate Horizontal Line -->
      <line x1="30" y1="184" x2="190" y2="184" stroke="#d6d3d1" stroke-width="1" />
      <polygon points="110,181 113,184 110,187 107,184" fill="#dfc593" />

      <!-- Left Page Sub-Badges -->
      <g transform="translate(10, 202)">
        <!-- House Badge -->
        <rect x="0" y="0" width="90" height="20" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="0.8" />
        <circle cx="10" cy="10" r="3" fill="#2563eb" />
        <text class="label-font" x="20" y="13" font-size="8" fill="#1e40af">RAVENCLAW</text>

        <!-- Wand Wood Badge -->
        <rect x="100" y="0" width="90" height="20" rx="10" fill="#fdf8e6" stroke="#d97706" stroke-width="0.8" />
        <circle cx="110" cy="10" r="3" fill="#b45309" />
        <text class="label-font" x="120" y="13" font-size="8" fill="#78350f">ELDER WAND</text>
      </g>
    </g>

    <!-- ================= RIGHT PAGE: ANCIENT SPELL ENTRIES ================= -->
    <g transform="translate(340, 45)">
      <!-- Elegant Right Page Title -->
      <text class="header-font" x="108" y="24" font-size="14" fill="#1e293b" text-anchor="middle" font-weight="900">THE SPELLBOOK LOG</text>
      <line x1="28" y1="34" x2="188" y2="34" stroke="#dfc593" stroke-width="1.5" />
      
      <!-- List of Magical Attributes styled as hand-inked ledger entries -->
      <g transform="translate(0, 58)">
        
        <!-- Entry 1: Hogwarts Registry -->
        <g transform="translate(10, 0)">
          <text class="label-font" x="0" y="12" fill="#57534e">🏰 WIZARD REGISTRY:</text>
          <text class="handwritten-font" x="0" y="29" font-size="13" font-weight="bold" fill="#1c1917">Ravenclaw Auror / Alchemist</text>
          <line x1="0" y1="36" x2="200" y2="36" stroke="#e7e5e4" stroke-dasharray="2 2" />
        </g>

        <!-- Entry 2: Chosen Class -->
        <g transform="translate(10, 48)">
          <text class="label-font" x="0" y="12" fill="#57534e">🪄 CORE ABILITIES:</text>
          <text class="handwritten-font" x="0" y="29" font-size="13" font-weight="bold" fill="#1c1917">Dreamweaving &amp; Illusion</text>
          <line x1="0" y1="36" x2="200" y2="36" stroke="#e7e5e4" stroke-dasharray="2 2" />
        </g>

        <!-- Entry 3: Domain Expansion -->
        <g transform="translate(10, 96)">
          <text class="label-font" x="0" y="12" fill="#57534e">🌌 CHOSEN SANCTUARY:</text>
          <text class="handwritten-font" x="0" y="29" font-size="13" font-weight="bold" fill="#0369a1" font-style="italic">"Infinite Repositories" Portal</text>
          <line x1="0" y1="36" x2="200" y2="36" stroke="#e7e5e4" stroke-dasharray="2 2" />
        </g>

        <!-- Entry 4: Signature Charm -->
        <g transform="translate(10, 144)">
          <text class="label-font" x="0" y="12" fill="#57534e">✨ SIGNATURE CHARM:</text>
          <text class="handwritten-font" x="0" y="29" font-size="13" font-weight="bold" fill="#b45309">Expecto Coding! 🔮</text>
          <line x1="0" y1="36" x2="200" y2="36" stroke="#e7e5e4" stroke-dasharray="2 2" />
        </g>

        <!-- Entry 5: Awakened Ability -->
        <g transform="translate(10, 192)">
          <text class="label-font" x="0" y="12" fill="#57534e">🧬 TRANSMUTATION ART:</text>
          <text class="handwritten-font" x="0" y="29" font-size="12" font-weight="bold" fill="#be185d">Syntactical Alchemy</text>
        </g>

      </g>
    </g>

  </g>
  
  <!-- Tiny Floating Sparkles/Astrological Stars near the Spellbook -->
  <g fill="#ffd700" class="sparkle-pulse">
    <!-- Star Sparkle 1 -->
    <path d="M 80,240 Q 85,240 85,235 Q 85,240 90,240 Q 85,240 85,245 Q 85,240 80,240" />
    <!-- Star Sparkle 2 -->
    <path d="M 720,280 Q 723,280 723,277 Q 723,280 726,280 Q 723,280 723,283 Q 723,280 720,280" fill="#e0e7ff" />
    <!-- Star Sparkle 3 -->
    <path d="M 400,20 Q 404,20 404,16 Q 404,20 408,20 Q 404,20 404,24 Q 404,20 400,20" />
  </g>
</svg>
